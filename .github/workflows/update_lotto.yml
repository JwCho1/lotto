name: Update Lotto Data

on:
  schedule:
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch lotto data
        run: python scripts/fetch_lotto_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lotto_history.json
          git diff --staged --quiet || git commit -m "chore: update lotto data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
