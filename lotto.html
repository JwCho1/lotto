<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>로또 번호 생성기</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa4b2;
    --accent: #5b8cff;
    --good: #4cd964;
    --bad: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, Roboto, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  h3 { margin-top: 0; font-size: 15px; }
  .ball-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .ball {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    position: relative;
    transform: scale(1);
  }
  .ball.mini { width: 30px; height: 30px; font-size: 12px; }

  /* ---- 뽑기 애니메이션 ---- */
  .ball.rolling {
    animation: rollPulse 0.12s linear infinite;
  }
  @keyframes rollPulse {
    0%   { transform: scale(1) rotate(0deg); }
    50%  { transform: scale(0.92) rotate(8deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .ball.settle {
    animation: settlePop 0.45s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes settlePop {
    0%   { transform: scale(0.5); opacity: 0.4; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .ball.placeholder {
    background: var(--bg) !important;
    border: 2px dashed var(--border);
    color: var(--muted) !important;
  }

  .plus { color: var(--muted); font-size: 18px; margin: 0 2px; }
  .prize-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  .prize-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    flex: 1 1 160px;
  }
  .prize-stat .label { color: var(--muted); font-size: 12px; }
  .prize-stat .value { font-size: 18px; font-weight: 700; margin-top: 4px; }
  button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .input-row input {
    width: 56px; height: 40px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  .saved-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .saved-item:last-child { border-bottom: none; }
  .status-pill {
    font-size: 12px; padding: 4px 10px; border-radius: 999px;
    white-space: nowrap;
  }
  .status-pill.pending { background: rgba(154,164,178,0.15); color: var(--muted); }
  .status-pill.win { background: rgba(76,217,100,0.15); color: var(--good); }
  .status-pill.lose { background: rgba(255,92,92,0.1); color: var(--bad); }
  .delete-btn {
    background: none; border: none; color: var(--muted);
    font-size: 12px; padding: 4px 8px; cursor: pointer;
  }
  .delete-btn:hover { color: var(--bad); }
  #status { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <h1>로또 번호 생성기</h1>

  <div class="card">
    <h3>번호 뽑기</h3>
    <div class="ball-row" id="generateRow" style="min-height: 42px; margin-bottom: 14px;"></div>
    <button id="generateBtn" type="button">랜덤 번호 뽑기</button>
    <button id="saveGeneratedBtn" type="button" disabled>이 번호 저장하기</button>
  </div>

  <div class="card">
    <h3>번호 직접 입력해서 저장</h3>
    <div class="input-row" id="manualInputs"></div>
    <button id="saveManualBtn" type="button">저장하기</button>
    <p id="manualError" style="color: var(--bad); font-size: 12px; margin: 6px 0 0;"></p>
  </div>

  <div class="card">
    <h3>내가 저장한 번호</h3>
    <div id="savedList"></div>
  </div>

  <p id="status">불러오는 중...</p>

<script>
const BALL_COLORS = [
  { bg: '#FAC775', text: '#412402' },
  { bg: '#85B7EB', text: '#042C53' },
  { bg: '#F09595', text: '#501313' },
  { bg: '#B4B2A9', text: '#2C2C2A' },
  { bg: '#97C459', text: '#173404' }
];
function colorForNumber(n) {
  if (n <= 10) return BALL_COLORS[0];
  if (n <= 20) return BALL_COLORS[1];
  if (n <= 30) return BALL_COLORS[2];
  if (n <= 40) return BALL_COLORS[3];
  return BALL_COLORS[4];
}
function makeBall(n, mini) {
  const c = colorForNumber(n);
  const el = document.createElement('div');
  el.className = 'ball' + (mini ? ' mini' : '');
  el.style.background = c.bg;
  el.style.color = c.text;
  el.textContent = n;
  return el;
}
function makePlaceholderBall() {
  const el = document.createElement('div');
  el.className = 'ball placeholder';
  el.textContent = '?';
  return el;
}
function formatWon(n) {
  return Math.round(n).toLocaleString('ko-KR') + '원';
}
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

const STORAGE_KEY = 'my-lotto-numbers';
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch (e) { return []; }
}
function saveSaved(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function rankOf(picked, draw) {
  const pickedSet = new Set(picked);
  const matchCount = draw.numbers.filter(n => pickedSet.has(n)).length;
  const bonusMatch = pickedSet.has(draw.bonus);
  if (matchCount === 6) return 1;
  if (matchCount === 5 && bonusMatch) return 2;
  if (matchCount === 5) return 3;
  if (matchCount === 4) return 4;
  if (matchCount === 3) return 5;
  return 0;
}
const RANK_LABEL = { 0: '낙첨', 1: '1등', 2: '2등', 3: '3등', 4: '4등', 5: '5등' };

let historyData = { draws: [] };
let latestDrawNo = 0;

async function load() {
  const statusEl = document.getElementById('status');
  try {
    const res = await fetch('./data/lotto_history.json?_=' + Date.now());
    if (!res.ok) throw new Error('lotto_history.json 로드 실패: ' + res.status);
    historyData = await res.json();
    historyData.draws.sort((a, b) => a.drwNo - b.drwNo);
    latestDrawNo = historyData.draws.length ? historyData.draws[historyData.draws.length - 1].drwNo : 0;
    renderLatestDraw();
    checkAndRenderSaved();
  }
}

function renderLatestDraw() {
  const el = document.getElementById('latestDrawInfo');
  if (!historyData.draws.length) {
    el.textContent = '아직 데이터가 없어요. GitHub Actions가 첫 실행되면 채워집니다.';
    return;
  }
  const latest = historyData.draws[historyData.draws.length - 1];
  el.innerHTML = '';

  const header = document.createElement('p');
  header.style.cssText = 'color:var(--muted); font-size:13px; margin:0 0 12px;';
  header.textContent = `${latest.drwNo}회 (${latest.date} 추첨)`;
  el.appendChild(header);

  const row = document.createElement('div');
  row.className = 'ball-row';
  latest.numbers.forEach(n => row.appendChild(makeBall(n, false)));
  const plus = document.createElement('span');
  plus.className = 'plus';
  plus.textContent = '+';
  row.appendChild(plus);
  row.appendChild(makeBall(latest.bonus, false));
  el.appendChild(row);

  const prizeRow = document.createElement('div');
  prizeRow.className = 'prize-row';
  prizeRow.innerHTML = `
    <div class="prize-stat">
      <div class="label">1등 당첨자 수</div>
      <div class="value">${latest.firstWinnerCount.toLocaleString('ko-KR')}명</div>
    </div>
    <div class="prize-stat">
      <div class="label">1등 1인당 당첨금</div>
      <div class="value">${formatWon(latest.firstPrizePerWinner)}</div>
    </div>
    <div class="prize-stat">
      <div class="label">1등 총 당첨금</div>
      <div class="value">${formatWon(latest.firstTotalPrize)}</div>
    </div>
  `;
  el.appendChild(prizeRow);
}

function checkAndRenderSaved() {
  const saved = loadSaved();
  let changed = false;
  saved.forEach(item => {
    if (item.rank === undefined && item.targetDrwNo <= latestDrawNo) {
      const draw = historyData.draws.find(d => d.drwNo === item.targetDrwNo);
      if (draw) {
        item.rank = rankOf(item.numbers, draw);
        changed = true;
      }
    }
  });
  if (changed) saveSaved(saved);
  renderSavedList(saved);
}

function renderSavedList(saved) {
  const container = document.getElementById('savedList');
  container.innerHTML = '';
  if (!saved.length) {
    container.innerHTML = '<p style="color:var(--muted); font-size:13px;">아직 저장한 번호가 없어요.</p>';
    return;
  }
  saved.slice().reverse().forEach(item => {
    const row = document.createElement('div');
    row.className = 'saved-item';

    const ballWrap = document.createElement('div');
    ballWrap.className = 'ball-row';
    item.numbers.slice().sort((a, b) => a - b).forEach(n => ballWrap.appendChild(makeBall(n, true)));

    const rightWrap = document.createElement('div');
    rightWrap.style.cssText = 'display:flex; align-items:center; gap:10px;';

    const targetLabel = document.createElement('span');
    targetLabel.style.cssText = 'font-size:12px; color:var(--muted);';
    targetLabel.textContent = `${item.targetDrwNo}회 대상`;

    const pill = document.createElement('span');
    if (item.rank === undefined) {
      pill.className = 'status-pill pending';
      pill.textContent = '추첨 대기중';
    } else if (item.rank === 0) {
      pill.className = 'status-pill lose';
      pill.textContent = '낙첨';
    } else {
      pill.className = 'status-pill win';
      pill.textContent = RANK_LABEL[item.rank] + ' 당첨!';
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '삭제';
    delBtn.onclick = () => {
      const updated = loadSaved().filter(x => x.id !== item.id);
      saveSaved(updated);
      renderSavedList(updated);
    };

    rightWrap.appendChild(targetLabel);
    rightWrap.appendChild(pill);
    rightWrap.appendChild(delBtn);

    row.appendChild(ballWrap);
    row.appendChild(rightWrap);
    container.appendChild(row);
  });
}

function addSavedEntry(numbers) {
  const saved = loadSaved();
  saved.push({
    id: Date.now() + '-' + Math.floor(Math.random() * 1000),
    numbers,
    targetDrwNo: latestDrawNo + 1,
    savedAt: new Date().toISOString(),
  });
  saveSaved(saved);
  renderSavedList(saved);
}

// ---- 랜덤 번호 뽑기 (애니메이션 포함) ----
let lastGenerated = null;
const generateBtn = document.getElementById('generateBtn');
const saveGeneratedBtn = document.getElementById('saveGeneratedBtn');
const generateRow = document.getElementById('generateRow');

function pickSixNumbers() {
  const pool = Array.from({ length: 45 }, (_, i) => i + 1);
  const result = [];
  for (let i = 0; i < 6; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool[idx]);
    pool.splice(idx, 1);
  }
  result.sort((a, b) => a - b);
  return result;
}

generateBtn.addEventListener('click', async () => {
  generateBtn.disabled = true;
  saveGeneratedBtn.disabled = true;
  lastGenerated = null;

  const finalNumbers = pickSixNumbers();

  // 1) 슬롯 6개 준비 (물음표 placeholder + 굴러가는 애니메이션)
  generateRow.innerHTML = '';
  const slots = [];
  for (let i = 0; i < 6; i++) {
    const slot = makePlaceholderBall();
    slot.classList.add('rolling');
    generateRow.appendChild(slot);
    slots.push(slot);
  }

  // 2) 슬롯마다 랜덤 숫자가 빠르게 깜빡이도록(룰렛 느낌) 잠깐 회전
  const spinTimers = slots.map(slot => setInterval(() => {
    slot.textContent = Math.floor(Math.random() * 45) + 1;
  }, 60));

  await sleep(700);

  // 3) 하나씩 순서대로 확정 숫자로 "착지"시키기
  for (let i = 0; i < 6; i++) {
    clearInterval(spinTimers[i]);
    const n = finalNumbers[i];
    const c = colorForNumber(n);
    const slot = slots[i];

    slot.classList.remove('rolling', 'placeholder');
    slot.style.background = c.bg;
    slot.style.color = c.text;
    slot.textContent = n;
    slot.classList.add('settle');

    await sleep(180);
  }

  lastGenerated = finalNumbers;
  generateBtn.disabled = false;
  saveGeneratedBtn.disabled = false;
});

saveGeneratedBtn.addEventListener('click', () => {
  if (!lastGenerated) return;
  addSavedEntry(lastGenerated);
  saveGeneratedBtn.disabled = true;
  lastGenerated = null;
  generateRow.innerHTML = '';
});

// ---- 번호 직접 입력 ----
const manualInputsEl = document.getElementById('manualInputs');
for (let i = 0; i < 6; i++) {
  const input = document.createElement('input');
  input.type = 'number';
  input.min = '1';
  input.max = '45';
  manualInputsEl.appendChild(input);
}

document.getElementById('saveManualBtn').addEventListener('click', () => {
  const errorEl = document.getElementById('manualError');
  const inputs = manualInputsEl.querySelectorAll('input');
  const numbers = Array.from(inputs).map(inp => parseInt(inp.value, 10));

  if (numbers.some(n => isNaN(n) || n < 1 || n > 45)) {
    errorEl.textContent = '1부터 45 사이의 숫자를 모두 입력해주세요.';
    return;
  }
  if (new Set(numbers).size !== 6) {
    errorEl.textContent = '중복되지 않는 숫자 6개를 입력해주세요.';
    return;
  }
  errorEl.textContent = '';
  addSavedEntry(numbers.sort((a, b) => a - b));
  inputs.forEach(inp => inp.value = '');
});

load();
</script>
</body>
</html>
